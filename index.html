<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#090D1F">
<title>بوصلة القبلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#090D1F;
    --night-2:#0E1430;
    --gold:#D9B45B;
    --gold-bright:#F2D488;
    --ivory:#F3ECDB;
    --muted:#7C84A6;
    --emerald:#2FA37E;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Reem Kufi','Amiri',serif;
    background:radial-gradient(ellipse 120% 80% at 50% -10%, #141B3D 0%, var(--night) 55%, #060812 100%);
    color:var(--ivory);
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:max(20px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));
    user-select:none;position:relative;
  }
  /* نجوم السماء */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--ivory);opacity:.35;animation:twinkle 3.5s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.5}}
  @media (prefers-reduced-motion:reduce){.stars i{animation:none}}

  header{text-align:center;z-index:2}
  .basmala{font-family:'Amiri',serif;font-size:15px;color:var(--gold);opacity:.85;letter-spacing:.5px}
  h1{font-family:'Amiri',serif;font-weight:700;font-size:clamp(28px,7vw,38px);margin-top:4px;
     background:linear-gradient(180deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{width:120px;height:14px;margin:6px auto 0;opacity:.9}

  /* البوصلة */
  .stage{position:relative;z-index:2;width:min(86vw,380px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  .halo{position:absolute;inset:-8%;border-radius:50%;
    background:radial-gradient(circle,rgba(217,180,91,.14) 0%,transparent 62%);
    transition:background .6s;pointer-events:none}
  .stage.aligned .halo{background:radial-gradient(circle,rgba(242,212,136,.32) 0%,transparent 65%)}
  svg{width:100%;height:100%;display:block;overflow:visible}
  #dial{transform-origin:200px 200px;will-change:transform}
  .stage.aligned .glowring{opacity:1}
  .glowring{opacity:0;transition:opacity .5s}

  /* القراءات */
  .readout{z-index:2;text-align:center;min-height:118px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .status{font-size:17px;color:var(--muted);transition:color .4s}
  .status.ok{color:var(--gold-bright);font-weight:700;font-size:19px}
  .numbers{display:flex;gap:28px;align-items:baseline;direction:ltr}
  .num{text-align:center}
  .num b{font-size:clamp(26px,7vw,34px);font-weight:700;color:var(--ivory);font-variant-numeric:tabular-nums;letter-spacing:1px}
  .num span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px;font-family:'Reem Kufi'}
  .num.gold b{color:var(--gold)}
  .distance{font-size:13.5px;color:var(--muted)}
  .distance em{color:var(--gold);font-style:normal;font-weight:700}

  /* شاشة البدء */
  .veil{position:fixed;inset:0;z-index:10;background:rgba(6,8,18,.88);backdrop-filter:blur(10px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px;text-align:center;
    transition:opacity .5s,visibility .5s}
  .veil.hide{opacity:0;visibility:hidden}
  .veil h2{font-family:'Amiri';font-size:26px;color:var(--gold-bright)}
  .veil p{color:var(--muted);font-size:15px;max-width:300px;line-height:1.9}
  .btn{font-family:'Reem Kufi';font-size:18px;font-weight:700;color:#1A1405;
    background:linear-gradient(180deg,var(--gold-bright),var(--gold));
    border:none;border-radius:100px;padding:15px 52px;cursor:pointer;
    box-shadow:0 0 0 1px rgba(242,212,136,.4),0 8px 30px rgba(217,180,91,.35);
    transition:transform .15s}
  .btn:active{transform:scale(.96)}
  .note{font-size:12.5px;color:var(--muted);opacity:.8}
  .err{color:#E58B7B;font-size:14px;max-width:300px;line-height:1.8;display:none}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="basmala">﷽</div>
  <h1>بوصلة القبلة</h1>
  <svg class="rule" viewBox="0 0 120 14"><path d="M0 7h44M76 7h44" stroke="#D9B45B" stroke-width="1" opacity=".6"/><path d="M60 1l4.5 6L60 13l-4.5-6z" fill="none" stroke="#D9B45B" stroke-width="1.2"/><circle cx="60" cy="7" r="1.4" fill="#D9B45B"/></svg>
</header>

<div class="stage" id="stage">
  <div class="halo"></div>
  <svg viewBox="0 0 400 400">
    <defs>
      <radialGradient id="face" cx="50%" cy="42%" r="65%">
        <stop offset="0%" stop-color="#141B3D"/><stop offset="100%" stop-color="#0A0F26"/>
      </radialGradient>
      <linearGradient id="gld" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F2D488"/><stop offset="100%" stop-color="#C79A3E"/>
      </linearGradient>
      <filter id="soft"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- الإطار الخارجي -->
    <circle cx="200" cy="200" r="192" fill="url(#face)" stroke="#2A3358" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="184" fill="none" stroke="url(#gld)" stroke-width="2"/>
    <circle cx="200" cy="200" r="176" fill="none" stroke="#2A3358" stroke-width="1"/>
    <circle class="glowring" cx="200" cy="200" r="184" fill="none" stroke="#F2D488" stroke-width="3" filter="url(#soft)"/>

    <!-- القرص الدوّار -->
    <g id="dial">
      <g id="ticks"></g>
      <!-- نجمة ثمانية (خاتم) -->
      <g opacity=".95">
        <path id="star8a" fill="none" stroke="url(#gld)" stroke-width="1.6"/>
        <path id="star8b" fill="none" stroke="#3A4470" stroke-width="1"/>
        <circle cx="200" cy="200" r="52" fill="none" stroke="#3A4470" stroke-width="1"/>
        <circle cx="200" cy="200" r="46" fill="none" stroke="url(#gld)" stroke-width="1" opacity=".7"/>
      </g>
      <!-- الجهات -->
      <g font-family="Amiri" font-weight="700" text-anchor="middle" fill="#F3ECDB">
        <text x="200" y="52" font-size="26" fill="url(#gld)">ش</text>
        <text x="200" y="368" font-size="22">ج</text>
        <text x="356" y="208" font-size="22">ق</text>
        <text x="44" y="208" font-size="22">غ</text>
      </g>
      <!-- مؤشر القبلة -->
      <g id="qibla" transform="rotate(0 200 200)" opacity="0">
        <line x1="200" y1="200" x2="200" y2="78" stroke="url(#gld)" stroke-width="2.5" stroke-dasharray="3 5" opacity=".85"/>
        <g filter="url(#soft)">
          <!-- الكعبة -->
          <rect x="186" y="34" width="28" height="28" rx="3" fill="#141414" stroke="url(#gld)" stroke-width="2"/>
          <rect x="186" y="41" width="28" height="5.5" fill="url(#gld)"/>
          <path d="M200 72l7 9h-14z" fill="url(#gld)"/>
        </g>
      </g>
    </g>

    <!-- إبرة ثابتة أعلى -->
    <path d="M200 10l8 20h-16z" fill="url(#gld)" filter="url(#soft)"/>
    <!-- المركز -->
    <circle cx="200" cy="200" r="7" fill="url(#gld)"/>
    <circle cx="200" cy="200" r="2.6" fill="#0A0F26"/>
  </svg>
</div>

<div class="readout">
  <div class="status" id="status">وجّه هاتفك أفقيًا</div>
  <div class="numbers">
    <div class="num gold"><b id="qDeg">--°</b><span>اتجاه القبلة</span></div>
    <div class="num"><b id="hDeg">--°</b><span>اتجاهك الآن</span></div>
  </div>
  <div class="distance" id="dist"></div>
</div>

<div class="veil" id="veil">
  <svg width="64" height="64" viewBox="0 0 64 64"><rect x="14" y="16" width="36" height="36" rx="4" fill="#141414" stroke="#D9B45B" stroke-width="2.5"/><rect x="14" y="25" width="36" height="7" fill="#D9B45B"/></svg>
  <h2>بوصلة القبلة</h2>
  <p>اسمح بالوصول إلى الموقع والبوصلة لتحديد اتجاه الكعبة المشرفة بدقة فائقة</p>
  <button class="btn" id="startBtn">ابدأ الآن</button>
  <div class="note">تعمل مباشرة دون إنترنت بعد الفتح</div>
  <div class="err" id="err"></div>
</div>

<script>
(function(){
  const KAABA = {lat:21.422487, lng:39.826206};
  const $ = id => document.getElementById(id);
  const stage=$('stage'), status=$('status'), qDegEl=$('qDeg'), hDegEl=$('hDeg'),
        distEl=$('dist'), veil=$('veil'), err=$('err'), dial=$('dial'), qiblaG=$('qibla');

  /* نجوم */
  const stars=$('stars');
  for(let i=0;i<45;i++){const s=document.createElement('i');
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.animationDelay=(Math.random()*4)+'s';
    s.style.transform='scale('+(0.5+Math.random())+')';stars.appendChild(s);}

  /* نجمة ثمانية */
  function starPath(cx,cy,r,rot){let p='';for(let i=0;i<4;i++){const a=rot+i*Math.PI/2;
    const pts=[[a,r],[a+Math.PI/4,r],[a+Math.PI/2,r],[a+3*Math.PI/4,r]];void pts;}
    // مربعان متداخلان
    const sq=(ang)=>{let d='';for(let k=0;k<4;k++){const t=ang+k*Math.PI/2;
      d+=(k? 'L':'M')+(cx+r*Math.cos(t)).toFixed(1)+' '+(cy+r*Math.sin(t)).toFixed(1);}return d+'Z';};
    return sq(rot);}
  $('star8a').setAttribute('d',starPath(200,200,140,-Math.PI/2)+starPath(200,200,140,-Math.PI/4));
  $('star8b').setAttribute('d',starPath(200,200,110,-Math.PI/2)+starPath(200,200,110,-Math.PI/4));

  /* علامات الدرجات */
  let t='';for(let d=0;d<360;d+=5){const big=d%45===0,med=d%15===0;
    const r1=176,r2=big?158:med?164:169;
    const a=(d-90)*Math.PI/180,c=Math.cos(a),s=Math.sin(a);
    t+='<line x1="'+(200+r1*c).toFixed(1)+'" y1="'+(200+r1*s).toFixed(1)+
       '" x2="'+(200+r2*c).toFixed(1)+'" y2="'+(200+r2*s).toFixed(1)+
       '" stroke="'+(big?'#D9B45B':'#3A4470')+'" stroke-width="'+(big?2:1)+'"/>';}
  $('ticks').innerHTML=t;

  const rad=x=>x*Math.PI/180, deg=x=>x*180/Math.PI, norm=x=>((x%360)+360)%360;

  function qiblaBearing(lat,lng){
    const φ1=rad(lat),φ2=rad(KAABA.lat),Δλ=rad(KAABA.lng-lng);
    return norm(deg(Math.atan2(Math.sin(Δλ),Math.cos(φ1)*Math.tan(φ2)-Math.sin(φ1)*Math.cos(Δλ))));}
  function distKm(lat,lng){
    const R=6371,φ1=rad(lat),φ2=rad(KAABA.lat),dφ=rad(KAABA.lat-lat),dλ=rad(KAABA.lng-lng);
    const a=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

  let qibla=null, heading=null, shown=0, aligned=false;

  function setLocation(lat,lng){
    qibla=qiblaBearing(lat,lng);
    qDegEl.textContent=Math.round(qibla)+'°';
    distEl.innerHTML='المسافة إلى مكة المكرمة <em>'+Math.round(distKm(lat,lng)).toLocaleString('ar-EG')+'</em> كم';
    qiblaG.setAttribute('transform','rotate('+qibla+' 200 200)');
    qiblaG.style.opacity=1;
    if(heading===null){status.textContent='حرّك هاتفك على شكل ∞ لمعايرة البوصلة';}
  }

  /* حركة ناعمة */
  function animate(){
    if(heading!==null){
      let diff=((heading-shown+540)%360)-180;
      shown=norm(shown+diff*0.15);
      dial.style.transform='rotate('+(-shown)+'deg)';
      hDegEl.textContent=Math.round(shown)+'°';
      if(qibla!==null){
        const off=Math.abs(((qibla-shown+540)%360)-180);
        const ok=off<3.5;
        if(ok!==aligned){aligned=ok;stage.classList.toggle('aligned',ok);
          if(ok){status.textContent='✦ أنت الآن باتجاه القبلة ✦';status.classList.add('ok');
            if(navigator.vibrate)navigator.vibrate([40,60,40]);}
          else{status.classList.remove('ok');}}
        if(!ok)status.textContent= off<20 ? 'اقتربت… '+Math.round(off)+'° فقط' :
          'أدر جسمك '+(((qibla-shown+540)%360)-180>0?'يمينًا':'يسارًا');
      }
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  function onOrient(e){
    let h=null;
    if(typeof e.webkitCompassHeading==='number'&&!isNaN(e.webkitCompassHeading)) h=e.webkitCompassHeading;
    else if(e.absolute&&e.alpha!=null) h=360-e.alpha;
    else if(e.alpha!=null&&h===null) h=360-e.alpha;
    if(h!=null) heading=norm(h);
  }

  function startSensors(){
    if('ondeviceorientationabsolute' in window)
      window.addEventListener('deviceorientationabsolute',onOrient,true);
    window.addEventListener('deviceorientation',onOrient,true);
  }

  function startGeo(){
    if(!navigator.geolocation){fail('المتصفح لا يدعم تحديد الموقع');return;}
    navigator.geolocation.getCurrentPosition(
      p=>setLocation(p.coords.latitude,p.coords.longitude),
      ()=>fail('تعذر تحديد الموقع — فعّل خدمة الموقع ثم أعد المحاولة'),
      {enableHighAccuracy:true,timeout:12000,maximumAge:600000});
  }
  function fail(msg){err.textContent=msg;err.style.display='block';veil.classList.remove('hide');}

  $('startBtn').addEventListener('click',async()=>{
    err.style.display='none';
    try{
      if(typeof DeviceOrientationEvent!=='undefined' &&
         typeof DeviceOrientationEvent.requestPermission==='function'){
        const r=await DeviceOrientationEvent.requestPermission();
        if(r!=='granted'){fail('يجب السماح بالوصول إلى البوصلة');return;}
      }
    }catch(_){}
    startSensors();startGeo();veil.classList.add('hide');
  });

  /* بدء فوري إن لم يتطلب النظام إذنًا (أندرويد غالبًا) */
  if(!(typeof DeviceOrientationEvent!=='undefined' &&
       typeof DeviceOrientationEvent.requestPermission==='function')){
    startSensors();
    setTimeout(()=>{ if(heading!==null){veil.classList.add('hide');startGeo();} },700);
  }
})();
</script>
</body>
</html>
